<H1 ALIGN="center">Definitions - GEO_HIERARCHY_PROFILE</H1>
Defines an ordered set of from-to geographic hierarchies.  This is used by procurement to define a ranked set of "good" geographies so that "bad" lanes can be eliminated when copying lanes from core gc3 to the procurement system.l<P>
