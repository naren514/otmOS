<H1 ALIGN="center">Definitions - ERROR_HELP</H1>
The ERROR_HELP table maps a translation id for errors to a URL (web address) that contains help to the user.<P>
<DL>
<DT><A NAME="ERROR_TRANSLATION_GID">ERROR_TRANSLATION_GID</A><DD>The translation that is associated with an error.
<DT><A NAME="HELP_URL">HELP_URL</A><DD>The URL, or web address, of a help page for an error.
</DL>
